<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <script src="javascript.js" defer></script>
    <meta name="theme-color" content="#121212">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Pay Tracker</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .bill-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
        .paid { text-decoration: line-through; color: #888; }
        input[type="number"] { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: none; }
        .tag { 
    font-size: 0.7em; 
    padding: 4px 8px; 
    border-radius: 5px; 
    margin-top: 4px;
    display: inline-block;
    color: white;
}
        .auto { background: #2e7d32; } /* Darker green */
        .manual { background: #1565c0; } /* Darker blue */

input[type="number"]::-webkit-inner-spin-button, 
input[type="number"]::-webkit-outer-spin-button { 
    -webkit-appearance: none; 
    margin: 0;
    display: none; /* Hides arrows on mobile to save space */
}
    </style>
</head>
<body>

    <h2>Next Payday: March 12</h2>
    <button onclick="addNewBill()" style="width: 100%; padding: 15px; background: #444; color: white; border: none; border-radius: 10px; margin-top: 20px; font-weight: bold;">
    + Add New Bill
</button>
    <div class="card">
        <label>Paycheck Amount ($):</label>
        <input type="number" id="paycheck" value="2000" oninput="calculate()">
        <h3 id="remaining">Remaining: $0.00</h3>
    </div>

    <div class="card" id="billList">
        <h3>Bills This Period</h3>
        </div>

</body>
</html>
