<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Pay Tracker</title>
    <script src="javascript.js" defer></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; margin: 0; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .bill-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        input[type="number"] { padding: 5px; border-radius: 4px; border: none; }
        #paycheck { width: 100%; box-sizing: border-box; height: 40px; font-size: 1.1em; background: #fff; color: #000; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body>
    <h2 style="margin-bottom: 10px;">Wolf Pay Tracker</h2>
    
    <div class="card">
        <label style="font-size: 0.8em; color: #aaa;">PAYCHECK AMOUNT ($)</label>
        <input type="number" id="paycheck" value="2000" oninput="calculate()">
        <h3 id="remaining" style="margin: 15px 0 0 0;">Safe to Spend: $0.00</h3>
        <div style="font-size: 0.7em; color: #ff9800; margin-top: 5px;">*Includes -$115.75 for Spring Taxes</div>
    </div>

    <div id="billList">
        </div>
</body>
</html>
